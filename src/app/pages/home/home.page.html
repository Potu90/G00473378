<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>G00473378</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="goToFavourites()">
        <ion-icon name="heart" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-searchbar [(ngModel)]="searchText" placeholder="Movie Name"></ion-searchbar>
  <ion-button expand="full" (click)="searchMovies()">SEARCH</ion-button>

  <ion-list *ngIf="recentSearches.length > 0">
    <ion-list-header>
      <ion-label>Recent Searches</ion-label>
    </ion-list-header>
    <ion-item *ngFor="let term of recentSearches" button="true" (click)="searchAgain(term)">
      <ion-label>{{term}}</ion-label>
    </ion-item>
  </ion-list>

  <ion-list>
    <ion-list-header>
      <ion-label *ngIf="searchText == ''">Today's Trending Movies</ion-label>
      <ion-label *ngIf="searchText != ''">{{searchText}} Movies</ion-label>
    </ion-list-header>
    <ion-item *ngFor="let movie of movies" (click)="goToMovieDetails(movie)">
      <img [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path" />
      <ion-label>{{movie.overview}}</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
