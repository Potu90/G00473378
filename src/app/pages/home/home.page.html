<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>G00473378</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="goToFavourites()">
        <ion-icon name="heart"></ion-icon>
        <ion-badge color="danger" *ngIf="favouritesCount > 0">{{favouritesCount}}</ion-badge>
      </ion-button>
    </ion-buttons> 
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-searchbar
    [(ngModel)]="searchText"
    placeholder="Movie Name"
    (ionFocus)="openRecentSearches()"
    (ionBlur)="closeRecentSearches()">
  </ion-searchbar>

  <ion-button expand="full" (click)="searchMovies()">SEARCH</ion-button>
  <ion-button expand="full" fill="outline" *ngIf="searchText != ''" (click)="backToTrending()">
    BACK TO TRENDING
  </ion-button>

  <ion-list *ngIf="showRecentSearches && recentSearches.length > 0">
    <ion-list-header>
      <ion-label>Recent Searches</ion-label>
    </ion-list-header>
    <ion-item *ngFor="let term of recentSearches" button="true" (click)="searchAgain(term)">
      <ion-label>{{term}}</ion-label>
    </ion-item>
  </ion-list>

  <ion-list>
    <ion-list-header>
      <ion-label *ngIf="searchText == ''">Today's Trending Movies</ion-label>
      <ion-label *ngIf="searchText != ''">{{searchText | titlecase}} Movies</ion-label>
    </ion-list-header>
    <ion-item *ngIf="movies.length == 0 && searchText != ''">
      <ion-label>No movies found for "{{searchText | titlecase}}"</ion-label>
    </ion-item>
    <ion-item *ngFor="let movie of movies" (click)="goToMovieDetails(movie)">
      <img *ngIf="movie.poster_path" [src]="'https://image.tmdb.org/t/p/w500' + movie.poster_path" />
      <ion-label *ngIf="!movie.poster_path">No image</ion-label>
      <ion-label>{{movie.overview}}</ion-label>
    </ion-item>
  </ion-list>
</ion-content>
