<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Favourite Movies</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="goToHome()">
        <ion-icon name="home" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <ion-item *ngIf="favourites.length == 1">
    <ion-label>You have 1 favourite movie</ion-label>
  </ion-item>
  <ion-item *ngIf="favourites.length > 1">
    <ion-label>You have {{favourites.length}} favourite movies</ion-label>
  </ion-item>

  <ion-list>
    <ion-list-header>
      <ion-label>My Favourite Movies</ion-label>
    </ion-list-header>

    <ion-item *ngIf="favourites.length == 0">
      <ion-label>You have no favourite movies yet.</ion-label>
    </ion-item>

    <ion-item *ngFor="let movie of favourites">
      <ion-thumbnail slot="start">
        <img src="https://image.tmdb.org/t/p/w200{{ movie.poster_path }}" alt="{{ movie.title }}">
      </ion-thumbnail>
      <ion-label>
        <h2>{{ movie.title }}</h2>
      </ion-label>
      <ion-button slot="end" (click)="goToMovieDetails(movie)">Details</ion-button>
    </ion-item>
  </ion-list>

  <ion-button expand="full" color="danger" *ngIf="favourites.length > 0" (click)="clearAllFavourites()">
    CLEAR ALL FAVOURITES
  </ion-button>

</ion-content>
