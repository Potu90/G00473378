<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title *ngIf="person">{{person.name}}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" *ngIf="person">
  <img *ngIf="person.profile_path" [src]="'https://image.tmdb.org/t/p/w500' + person.profile_path" />
  <ion-item *ngIf="!person.profile_path">
    <ion-label>No image</ion-label>
  </ion-item>

  <ion-item>
    <ion-label>{{person.name}}</ion-label>
  </ion-item>

  <ion-item *ngIf="person.birthday">
    <ion-label>{{person.birthday}} - {{person.deathday}}</ion-label>
  </ion-item>

  <ion-item *ngIf="person.place_of_birth">
    <ion-label>{{person.place_of_birth}}</ion-label>
  </ion-item>

  <ion-list *ngIf="person.also_known_as && person.also_known_as.length > 0">
    <ion-item *ngFor="let aka of person.also_known_as">
      <ion-label>{{aka}}</ion-label>
    </ion-item>
  </ion-list>

  <ion-item>
    <ion-label>{{person.biography}}</ion-label>
  </ion-item>

  <ion-list>
    <ion-list-header>
      <ion-label>Other Movies</ion-label>
    </ion-list-header>
    <ion-item *ngFor="let movie of movies" button="true" (click)="goToMovieDetails(movie)">
      <ion-label>{{movie.title}}</ion-label>
      <img *ngIf="movie.poster_path" [src]="'https://image.tmdb.org/t/p/w200' + movie.poster_path" slot="end" />
      <ion-label *ngIf="!movie.poster_path" slot="end">No image</ion-label>
    </ion-item>
  </ion-list>

</ion-content>
