<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title *ngIf="movie">{{movie.title}}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="goToHome()">
        <ion-icon name="home"></ion-icon>
      </ion-button>
      <ion-button (click)="goToFavourite()">
        <ion-icon name="heart"></ion-icon>
        <ion-badge color="danger" *ngIf="favouritesCount > 0">{{favouritesCount}}</ion-badge>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" *ngIf="movie">

  <ion-item>
    <ion-label>{{movie.overview}}</ion-label>
  </ion-item>

  <ion-button *ngIf="!favourite" (click)="addToFavourites()">
    <ion-icon name="heart"></ion-icon>
    Add To Favourites
  </ion-button>

  <ion-button *ngIf="favourite" (click)="removeFromFavourites()">
    <ion-icon name="heart"></ion-icon>
    Remove From Favourites
  </ion-button>

  <ion-list>
    <ion-list-header>
      <ion-label>Cast</ion-label>
    </ion-list-header>
    <ion-item *ngFor="let person of cast" button="true" (click)="goToDetails(person)">
      <img [src]="'https://image.tmdb.org/t/p/w500' + person.profile_path" />
      <ion-label>
        <p>{{person.character}}</p>
        <p>{{person.name}}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-list>
    <ion-list-header>
      <ion-label>Crew</ion-label>
    </ion-list-header>
    <ion-item *ngFor="let person of crew" button="true" (click)="goToDetails(person)">
      <img [src]="'https://image.tmdb.org/t/p/w500' + person.profile_path" />
      <ion-label>
        <p>{{person.job}}</p>
        <p>{{person.name}}</p>
      </ion-label>
    </ion-item>
  </ion-list>

</ion-content>
